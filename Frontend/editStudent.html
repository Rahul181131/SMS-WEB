<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Student | Student Management System</title>


 <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/responsive.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

/* Navbar */

.navbar{
    background:#2563eb;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar h2{
    font-size:28px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:500;
}

.navbar a:hover{
    text-decoration:underline;
}

/* Form */

.container{
    width:850px;
    max-width:95%;
    background:white;
    margin:40px auto;
    padding:35px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.container h1{
    text-align:center;
    color:#2563eb;
}

.container p{
    text-align:center;
    color:#666;
    margin:10px 0 30px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    font-weight:600;
}

.input-group input,
.input-group select,
.input-group textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

textarea{
    resize:none;
}

.full-width{
    grid-column:1/3;
}

/* Buttons */

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

button{
    padding:12px 28px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.update{
    background:#10b981;
    color:white;
}

.update:hover{
    background:#059669;
}

.cancel{
    background:#ef4444;
    color:white;
}

.cancel:hover{
    background:#dc2626;
}

@media(max-width:768px){

.form-grid{
    grid-template-columns:1fr;
}

.full-width{
    grid-column:1;
}

}

</style>

</head>

<body>

<div class="navbar">

<h2>Student Management System</h2>

<div>
<a href="dashboard.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="login.html">Logout</a>
</div>

</div>

<div class="container">

<h1>Edit Student</h1>

<p>Update the student's information and save the changes.</p>

<form id="editStudentForm">

<div class="form-grid">

<div class="input-group">
<label>Student ID</label>
<input id="studentId" type="text" readonly required>
</div>

<div class="input-group">
<label>Full Name</label>
<input id="studentName" type="text">
</div>

<div class="input-group">
<label>Email Address</label>
<input id="email" type="email">
</div>

<div class="input-group">
<label>Mobile Number</label>
<input id="mobile" type="tel">
</div>

<div class="input-group">
<label>Gender</label>
<select id="gender">
<option selected>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="input-group">
<label>Date of Birth</label>
<input id="dob" type="date">
</div>

<div class="input-group">
<label>Department</label>
<select id="department">
<option>Computer Science</option>
<option selected>Information Technology</option>
<option>Electronics</option>
<option>Mechanical</option>
<option>Civil</option>
</select>
</div>

<div class="input-group">
<label>Course</label>
<input id="course" type="text">
</div>

<div class="input-group">
<label>Year</label>
<select id="year">
<option>1st Year</option>
<option selected>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>

<div class="input-group">
<label>Admission Date</label>
<input id="admissionDate" type="date">
</div>

<div class="input-group full-width">
<label>Address</label>
<textarea id="address" rows="4"></textarea>
</div>

</div>

<div class="buttons">

<button type="submit" id="updateBtn" class="update">
<i class="fa-solid fa-pen-to-square"></i>
 Update Student
</button>

<button type="button" class="cancel"
onclick="window.location.href='students.html'">
<i class="fa-solid fa-xmark"></i>
 Cancel
</button>

</div>

</form>

</div>
<script src="javaScript/api.js"></script>
<script src="javaScript/editstudent.js"></script>
</body>
</html>
