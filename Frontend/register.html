<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System | Register</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #2563eb, #06b6d4);
            padding: 20px;
        }

        .register-container {
            width: 450px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 35px;
            color: #fff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .25);
        }

        .register-container h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 30px;
        }

        .register-container p {
            text-align: center;
            margin-bottom: 25px;
            color: #e5e7eb;
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d1d5db;
        }

        .input-box input,
        .input-box select {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        .gender {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #fff;
        }

        .gender label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #2563eb;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        .register-btn:hover {
            background: #dbeafe;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }

        .login-link a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media(max-width:500px) {

            .register-container {
                width: 100%;
                padding: 25px;
            }

        }
    </style>

</head>

<body>

    <div class="register-container">

        <h2>
            <i class="fa-solid fa-user-plus"></i>
            Create Account
        </h2>

        <p>Register to access the Student Management System</p>

        <form id="registerForm">

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
               <input id="fullName" type="text" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
               <input id="email" type="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input id="mobile" type="tel" placeholder="Mobile Number">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-building-columns"></i>
                <select required>
                    <option value="">Select Department</option>
                    <option>Computer Science</option>
                    <option>Information Technology</option>
                    <option>Electronics</option>
                    <option>Mechanical</option>
                    <option>Civil</option>
                    <option>Business Administration</option>
                </select>
            </div>

            <div class="gender">
                <label>
                    <input type="radio" name="gender">
                    Male
                </label>

                <label>
                    <input type="radio" name="gender">
                    Female
                </label>

                <label>
                    <input type="radio" name="gender">
                    Other
                </label>
            </div>

            <div class="input-box">

                <i class="fa-solid fa-user-shield"></i>

                <select id="role" required>

                    <option value="">Select Role</option>

                    <option value="ADMIN">Admin</option>

                    <option value="USER">User</option>

                </select>

            </div>


            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input id="password" type="password" placeholder="Create Password" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
               <input id="confirmPassword" type="password" placeholder="Confirm Password" required>
            </div>

            <button type="submit" id="registerBtn">
                <!-- <i class="fa-solid fa-user-check"></i> -->
                Register
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="login.html">Login Here</a>
        </div>

    </div>

    <script src="javaScript/api.js"></script>
    <script src="javaScript/register.js"></script>

</body>

</html>
